<!DOCTYPE html>
<html>
<head>
<title>Brainrot World</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

#game{
    width:800px;
    height:500px;
    background:#3aa655;
    margin:auto;
    position:relative;
    border:3px solid white;
    overflow:hidden;
}

#player{
    width:40px;
    height:40px;
    background:blue;
    position:absolute;
    left:380px;
    top:230px;
}

.brainrot{
    width:45px;
    height:45px;
    background:red;
    border-radius:50%;
    position:absolute;
}

</style>
</head>

<body>

<h1>🧠 Brainrot World</h1>

<h2>💰 Money: <span id="money">0</span></h2>

<div id="game">

<div id="player"></div>

</div>


<script>

let money = 0;

let game = document.getElementById("game");
let player = document.getElementById("player");


// Brainrot spawn

function createBrainrot(){

let brain = document.createElement("div");

brain.className="brainrot";

brain.style.left=Math.random()*750+"px";
brain.style.top=Math.random()*450+"px";

game.appendChild(brain);


brain.onclick=function(){

money += 100;

document.getElementById("money").innerHTML=money;

brain.remove();

}

}


// automatically spawn

setInterval(createBrainrot,3000);


// Player movement

document.addEventListener("keydown",function(e){

let x=player.offsetLeft;
let y=player.offsetTop;


if(e.key=="ArrowRight") x+=10;
if(e.key=="ArrowLeft") x-=10;
if(e.key=="ArrowUp") y-=10;
if(e.key=="ArrowDown") y+=10;


player.style.left=x+"px";
player.style.top=y+"px";

});


</script>

</body>
</html>
