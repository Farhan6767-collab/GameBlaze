<!DOCTYPE html>
<html>
<head>
<title>Steal Brainrot</title>
<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#game{
width:700px;
height:450px;
background:green;
margin:auto;
position:relative;
border:3px solid white;
}

#player{
width:40px;
height:40px;
background:blue;
position:absolute;
left:330px;
top:200px;
}

.brainrot{
width:35px;
height:35px;
background:red;
border-radius:50%;
position:absolute;
}

</style>
</head>

<body>

<h1>🧠 Steal Brainrot</h1>

<h2>💰 Money: <span id="money">0</span></h2>

<button onclick="spawn()">Spawn Brainrot</button>
<h2>👑 Admin Panel</h2>

<input id="moneyInput" placeholder="Money amount">

<button onclick="setMoney()">
Set Money
</button>

<br><br>

<button onclick="adminSpawn()">
Admin Spawn Brainrot
</button>
<div id="game">
<div id="player"></div>
</div>


<script>

let money=0;

let game=document.getElementById("game");
let player=document.getElementById("player");


function spawn(){

let b=document.createElement("div");

b.className="brainrot";

b.style.left=Math.random()*650+"px";
b.style.top=Math.random()*400+"px";

game.appendChild(b);


b.onclick=function(){

money+=100;

document.getElementById("money").innerHTML=money;

b.remove();

}

}


</script>

</body>
</html>
