<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameBlaze</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#1a1a1a;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
color:#00bfff;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

nav a:hover{
color:#00bfff;
}

.search{
padding:10px;
width:220px;
border:none;
border-radius:8px;
}

.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

.play{
background:#00bfff;
color:white;
padding:15px 35px;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
}

.play:hover{
background:#0095cc;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:#222;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:15px;
}

.card button{
margin:15px;
padding:10px 20px;
background:#00bfff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
background:#1a1a1a;
padding:20px;
text-align:center;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<div class="logo">🎮 GameBlaze</div>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Trending</a>
<a href="#">Contact</a>
</nav>

<input type="text" class="search" placeholder="🔍 Search Games...">

</header>

<section class="hero">

<h1>Play Free Online Games</h1>

<p>Thousands of amazing browser games for free.</p>

<button class="play">Play Now</button>

</section>

<section class="games">

<section class="games">

<div class="card">
<img src="https://picsum.photos/400/250?1">
<h3>Car Racing</h3>
<button>Play</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?2">
<h3>Shooting Game</h3>
<a href="game1.html">
<button>Play</button>
</a>
</div

<div class="card">
<img src="https://picsum.photos/400/250?3">
<h3>Horror Game</h3>
<button>Play</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?4">
<h3>Puzzle Game</h3>
<a href="game1.html">
<button>Play</button>
</a>
</div>

</section>

<footer>

© 2026 GameBlaze | All Rights Reserved

</footer>

</body>
</html>
